<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Контакты</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        nav a { margin-right: 15px; }
        input, textarea { display: block; margin: 10px 0; padding: 8px; width: 300px; }
        button { padding: 10px 20px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Главная</a>
        <a href="catalog.html">Каталог</a>
        <a href="product.html">Товар</a>
        <a href="contacts.html">Контакты</a>
        <a href="admin.html">Админка</a>
    </nav>
    <h1>Свяжитесь с нами</h1>
    <form id="feedbackForm">
        <input type="text" id="name" placeholder="Ваше имя" required>
        <input type="email" id="email" placeholder="Ваш email" required>
        <textarea id="message" placeholder="Сообщение" rows="5" required></textarea>
        <button type="submit">Отправить</button>
    </form>
    <p id="formMessage"></p>

    <script>
        // Получаем email из localStorage или используем стандартный
        let adminEmail = localStorage.getItem('contactEmail');
        if (!adminEmail) {
            adminEmail = 'admin@example.com';
        }

        document.getElementById('feedbackForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            
            document.getElementById('formMessage').innerHTML = `✅ Сообщение отправлено на ${adminEmail}<br>
            Имя: ${name}<br>
            Email: ${email}<br>
            Сообщение: ${message}`;
            document.getElementById('formMessage').style.color = 'green';
            
            // Очистка формы
            this.reset();
        });
    </script>
</body>
</html>
